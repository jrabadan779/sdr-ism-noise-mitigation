<svg viewBox="0 0 900 460" xmlns="http://www.w3.org/2000/svg" font-family="Arial, Helvetica, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#94a3b8"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="900" height="460" fill="#0d1117"/>

  <text x="20" y="40" font-size="16" font-weight="700" fill="#ffffff">Mitigación de ruido ISM 2.4 GHz - Cadena de procesado (fs = 20 MS/s)</text>

  <!-- Signal Source -->
  <rect x="20" y="190" width="130" height="60" rx="8" fill="#1e3a5f" stroke="#60a5fa" stroke-width="2"/>
  <text x="85" y="214" font-size="13" font-weight="600" fill="#ffffff" text-anchor="middle">Signal Source</text>
  <text x="85" y="232" font-size="10" fill="#cbd5e1" text-anchor="middle">Cosine · f=0 · A=1</text>

  <!-- Channel Model -->
  <rect x="190" y="190" width="130" height="60" rx="8" fill="#4a1d1d" stroke="#f87171" stroke-width="2"/>
  <text x="255" y="214" font-size="13" font-weight="600" fill="#ffffff" text-anchor="middle">Channel Model</text>
  <text x="255" y="232" font-size="10" fill="#cbd5e1" text-anchor="middle">AWGN · nv=0.3</text>

  <!-- Throttle -->
  <rect x="360" y="190" width="120" height="60" rx="8" fill="#1e293b" stroke="#94a3b8" stroke-width="2"/>
  <text x="420" y="214" font-size="13" font-weight="600" fill="#ffffff" text-anchor="middle">Throttle</text>
  <text x="420" y="232" font-size="10" fill="#cbd5e1" text-anchor="middle">20 MS/s</text>

  <line x1="150" y1="220" x2="188" y2="220" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="320" y1="220" x2="358" y2="220" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow)"/>

  <circle cx="510" cy="220" r="4" fill="#94a3b8"/>
  <line x1="480" y1="220" x2="508" y2="220" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- RAMA BASELINE -->
  <text x="600" y="70" font-size="11" font-weight="600" fill="#e2e8f0">RAMA BASELINE (referencia)</text>
  <path d="M510,216 L510,100 L560,100" fill="none" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="560" y="75" width="140" height="50" rx="8" fill="#1e293b" stroke="#94a3b8" stroke-width="2"/>
  <text x="630" y="96" font-size="13" font-weight="600" fill="#ffffff" text-anchor="middle">Freq Sink</text>
  <text x="630" y="113" font-size="10" fill="#cbd5e1" text-anchor="middle">Espectro baseline</text>

  <path d="M510,220 L510,160 L560,160" fill="none" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="560" y="140" width="150" height="50" rx="8" fill="#1e293b" stroke="#94a3b8" stroke-width="2"/>
  <text x="635" y="161" font-size="13" font-weight="600" fill="#ffffff" text-anchor="middle">Probe Avg Mag² (cf)</text>
  <text x="635" y="178" font-size="10" fill="#cbd5e1" text-anchor="middle">Potencia total</text>
  <line x1="710" y1="165" x2="748" y2="165" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="750" y="140" width="120" height="50" rx="8" fill="#1e293b" stroke="#94a3b8" stroke-width="2"/>
  <text x="810" y="161" font-size="13" font-weight="600" fill="#ffffff" text-anchor="middle">Number Sink</text>
  <text x="810" y="178" font-size="10" fill="#cbd5e1" text-anchor="middle">P_baseline</text>

  <!-- RAMA MITIGADA -->
  <text x="600" y="300" font-size="11" font-weight="600" fill="#e2e8f0">RAMA MITIGADA (FIR)</text>
  <path d="M510,224 L510,330 L548,330" fill="none" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="550" y="305" width="120" height="60" rx="8" fill="#14352a" stroke="#4ade80" stroke-width="2"/>
  <text x="610" y="329" font-size="13" font-weight="600" fill="#ffffff" text-anchor="middle">FIR Low Pass</text>
  <text x="610" y="346" font-size="10" fill="#cbd5e1" text-anchor="middle">cut=600k · Hamming</text>

  <circle cx="700" cy="335" r="4" fill="#94a3b8"/>
  <line x1="670" y1="335" x2="698" y2="335" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow)"/>

  <path d="M700,331 L700,290 L740,290" fill="none" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="742" y="265" width="140" height="50" rx="8" fill="#1e293b" stroke="#94a3b8" stroke-width="2"/>
  <text x="812" y="286" font-size="13" font-weight="600" fill="#ffffff" text-anchor="middle">Freq Sink</text>
  <text x="812" y="303" font-size="10" fill="#cbd5e1" text-anchor="middle">Espectro filtrado</text>

  <path d="M700,335 L700,400 L740,400" fill="none" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="742" y="375" width="150" height="50" rx="8" fill="#1e293b" stroke="#94a3b8" stroke-width="2"/>
  <text x="817" y="396" font-size="13" font-weight="600" fill="#ffffff" text-anchor="middle">Probe → Number</text>
  <text x="817" y="413" font-size="10" fill="#cbd5e1" text-anchor="middle">P_filtrada</text>
</svg>
